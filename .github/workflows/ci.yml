# ===========================================
# CI — Pull Request Quality Gate
# ===========================================
# Runs on every PR to main. Must pass before merge.
# Concurrency: cancels older runs on the same PR (save runner minutes).

name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----- Lint + Type Check -----
  check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Install all workspace dependencies from root lockfile
      - run: npm ci

      # Generate Prisma client (needed for type-checking)
      - name: Generate Prisma client
        run: npx prisma generate --schema=backend/prisma/schema.prisma

      # Lint both workspaces
      - name: Lint
        run: npm run lint

      # Type-check backend (tsc --noEmit via build script)
      - name: Type-check backend
        run: npm run build --workspace=backend

      # Type-check frontend (next build does type-checking)
      # Skipped here — covered by build-test job below

  # ----- Tests -----
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: check
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kanbex
          POSTGRES_PASSWORD: kanbex_secret
          POSTGRES_DB: kanbex_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kanbex -d kanbex_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=backend/prisma/schema.prisma

      - name: Run Prisma migrations on test database
        run: npx prisma migrate deploy --schema=backend/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://kanbex:kanbex_secret@localhost:5432/kanbex_test?schema=public

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://kanbex:kanbex_secret@localhost:5432/kanbex_test?schema=public
          REDIS_URL: redis://localhost:6379/1
          JWT_SECRET: test-jwt-secret-that-is-at-least-32-characters-long
          CORS_ORIGIN: http://localhost:3000
          FRONTEND_URL: http://localhost:3000
          APP_URL: http://localhost:3000
          API_URL: http://localhost:4000

  # ----- Docker Build Test -----
  # Verifies both Dockerfiles build successfully without pushing
  build-test:
    name: Docker Build Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build frontend image (verify Dockerfile works)
      - name: Build frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: false
          build-args: |
            NEXT_PUBLIC_API_URL=https://placeholder-replace-after-render-deploy.onrender.com
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      # Build backend image (verify Dockerfile works)
      - name: Build backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: false
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
